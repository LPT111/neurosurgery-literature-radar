name: Neurosurgery Literature Radar V1

on:
  workflow_dispatch:
  schedule:
    - cron: '40 23 * * *'

permissions:
  contents: write

concurrency:
  group: neurosurgery-literature-radar-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_APP_PASSWORD: ${{ secrets.SMTP_APP_PASSWORD }}
      EMAIL_TO: ${{ secrets.EMAIL_TO || 'lipengtao12@gmail.com' }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      PUBLIC_DASHBOARD_URL: ${{ secrets.PUBLIC_DASHBOARD_URL }}
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
      PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
      PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
      SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile
        run: python -m py_compile run_daily.py preview_local.py src/*.py

      - name: Generate preview
        run: python preview_local.py

      - name: Run daily radar
        run: python run_daily.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json output/briefing.md output/briefing.txt index.html
          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "chore: update neurosurgery literature radar $(date '+%Y-%m-%d %H:%M')"
            git push
          fi
